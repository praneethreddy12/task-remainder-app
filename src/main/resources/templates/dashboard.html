<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Dashboard - Task Reminder</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Open Sans", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e0f7fa, #b2ebf2, #80deea);
      padding: 90px 30px 80px;
      color: #004d40;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      padding: 14px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
    }

    header h1 {
      color: #006064;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .logout-btn {
      background: rgba(198, 40, 40, 0.12);
      color: #c62828;
      padding: 8px 18px;
      border-radius: 5px;
      text-decoration: none;
      border: 1px solid rgba(198, 40, 40, 0.3);
      font-size: 13px;
      font-weight: 600;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background: rgba(198, 40, 40, 0.22);
    }

    /* ── Footer ── */
    footer {
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      padding: 14px 30px;
      text-align: center;
      position: fixed;
      bottom: 0;
      left: 0;
    }

    footer p {
      color: rgba(0, 96, 100, 0.6);
      font-size: 13px;
    }

    /* ── Section headings ── */
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(0, 96, 100, 0.6);
      margin: 24px auto 12px;
      max-width: 800px;
    }

    /* ── Add Task Form ── */
    form {
      max-width: 800px;
      margin: 0 auto 24px;
      padding: 25px 30px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 4px 24px rgba(0, 188, 212, 0.15);
    }

    form h3 {
      color: #006064;
      font-size: 15px;
      margin-bottom: 16px;
    }

    input[type="text"],
    input[type="datetime-local"] {
      width: 100%;
      padding: 8px 0;
      margin: 6px 0 14px;
      border: none;
      border-bottom: 2px solid #80deea;
      background: transparent;
      color: #004d40;
      font-size: 14px;
      outline: none;
      font-family: "Open Sans", sans-serif;
    }

    input[type="text"]::placeholder {
      color: rgba(0, 96, 100, 0.45);
    }

    input[type="datetime-local"] {
      color-scheme: light;
    }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.4) sepia(1) saturate(3) hue-rotate(150deg);
      cursor: pointer;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 6px;
    }

    button {
      padding: 10px 20px;
      background: #0097a7;
      color: #fff;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
      font-family: "Open Sans", sans-serif;
    }

    button:hover {
      background: transparent;
      color: #0097a7;
      border: 1px solid #0097a7;
    }

    .export-btn {
      background: transparent;
      color: #006064;
      border: 1px solid rgba(0, 96, 100, 0.35);
    }

    .export-btn:hover {
      background: rgba(0, 150, 167, 0.1);
      color: #006064;
      border: 1px solid rgba(0, 96, 100, 0.35);
    }

    /* ── Stat Cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      max-width: 800px;
      margin: 0 auto 24px;
    }

    .stat {
      border-radius: 10px;
      padding: 18px 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 4px 24px rgba(0, 188, 212, 0.12);
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
      color: rgba(0, 96, 100, 0.6);
    }

    .stat-value {
      font-size: 30px;
      font-weight: 700;
      color: #006064;
    }

    .s-pending   .stat-value { color: #e65100; }
    .s-completed .stat-value { color: #2e7d32; }

    /* ── Chart ── */
    .chart-container {
      max-width: 800px;
      margin: 0 auto 24px;
      padding: 25px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 4px 24px rgba(0, 188, 212, 0.12);
    }

    .chart-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(0, 96, 100, 0.6);
      margin-bottom: 18px;
    }

    .chart-container canvas { max-height: 260px; }

    /* ── Table ── */
    .table-wrap {
      max-width: 800px;
      margin: 0 auto;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 188, 212, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
    }

    th {
      background: rgba(0, 151, 167, 0.15);
      color: #006064;
      padding: 11px 12px;
      text-align: left;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0, 150, 167, 0.12);
      color: #004d40;
      font-size: 14px;
    }

    tr:nth-child(even) { background: rgba(255, 255, 255, 0.3); }
    tr:hover { background: rgba(0, 188, 212, 0.08); }

    .edit-btn {
      color: #0097a7;
      text-decoration: none;
      margin-right: 8px;
      font-weight: 600;
    }

    .delete-btn {
      color: #c62828;
      text-decoration: none;
      font-weight: 600;
    }

    .edit-btn:hover, .delete-btn:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .stat-grid { grid-template-columns: 1fr; }
      form { width: 100%; }
      table { font-size: 12px; }
      td, th { padding: 8px; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <h1>Automatic Task Reminder</h1>
  <a href="/logout" class="logout-btn">Logout</a>
</header>

<!-- Add Task Form -->
<form action="/add-task" method="post">
  <h3>➕ Add New Task</h3>
  <input type="text" name="title" placeholder="Task Title" required>
  <input type="text" name="description" placeholder="Task Description" required>
  <input type="text" name="status" placeholder="pending / completed">
  <input type="datetime-local" name="dueDate">
  <div class="btn-row">
    <button type="submit">Add Task</button>
    <button type="button" class="export-btn" onclick="location.href='/export'">Export CSV</button>
  </div>
</form>

<!-- Stat Cards -->
<div class="section-title">Overview</div>
<div class="stat-grid">
  <div class="stat s-total">
    <div class="stat-label">Total Tasks</div>
    <div class="stat-value" th:text="${totalTasks}">0</div>
  </div>
  <div class="stat s-pending">
    <div class="stat-label">Pending</div>
    <div class="stat-value" th:text="${pendingCount}">0</div>
  </div>
  <div class="stat s-completed">
    <div class="stat-label">Completed</div>
    <div class="stat-value" th:text="${completedCount}">0</div>
  </div>
</div>

<!-- Bar Chart -->
<div class="chart-container">
  <div class="chart-title">Task Insights</div>
  <canvas id="barChart"></canvas>
</div>

<!-- Tasks Table -->
<div class="section-title">Your Tasks</div>
<div class="table-wrap">
  <table>
    <tr>
      <th>Title</th>
      <th>Description</th>
      <th>Status</th>
      <th>Due Date</th>
      <th>Actions</th>
    </tr>
    <tr th:each="t: ${tasks}">
      <td th:text="${t.title}"></td>
      <td th:text="${t.description}"></td>
      <td th:text="${t.status}"></td>
      <td th:text="${t.dueDate}"></td>
      <td>
        <a th:href="@{'/edit/' + ${t.id}}" class="edit-btn">Edit</a>
        |
        <a th:href="@{'/delete/' + ${t.id}}" class="delete-btn"
           onclick="return confirm('Are you sure you want to delete this task?')">Delete</a>
      </td>
    </tr>
  </table>
</div>

<footer>
  <p>&copy; 2026 Automatic Task Reminder. All rights reserved.</p>
</footer>

<script th:inline="javascript">
  const total     = [[${totalTasks}]];
  const pending   = [[${pendingCount}]];
  const completed = [[${completedCount}]];

  const ctx = document.getElementById('barChart');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Total Tasks', 'Pending', 'Completed'],
      datasets: [{
        label: 'Task Insights',
        data: [total, pending, completed],
        backgroundColor: [
          'rgba(0, 151, 167, 0.2)',
          'rgba(230, 81, 0,  0.2)',
          'rgba(46, 125, 50, 0.2)'
        ],
        borderColor: [
          '#0097a7',
          '#e65100',
          '#2e7d32'
        ],
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true,
          ticks: { color: 'rgba(0,96,100,0.7)', stepSize: 1 },
          grid:  { color: 'rgba(0,150,167,0.12)' }
        },
        x: {
          ticks: { color: 'rgba(0,96,100,0.7)' },
          grid:  { display: false }
        }
      },
      plugins: {
        legend: { labels: { color: '#006064' } }
      }
    }
  });
</script>

</body>
</html>
