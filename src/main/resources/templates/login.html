<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/style.css">
    <meta charset="UTF-8">
    <title>Login - Task Remainder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Open Sans", sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #000000, #434343);
            padding-top: 60px;
            padding-bottom: 60px;
        }

        header {
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 14px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
        }

        header h1 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        footer {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 14px 30px;
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
        }

        footer p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }

        form {
            width: 350px;
            padding: 30px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }

        input {
            width: 100%;
            height: 40px;
            margin: 10px 0;
            padding: 0 10px;
            border: none;
            outline: none;
            border-bottom: 2px solid #ccc;
            background: transparent;
            color: #fff;
            font-size: 15px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #fff;
            color: #000;
            font-weight: 600;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
        }

        .error-message {
            color: #ff4d4d;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }

        a {
            margin-top: 15px;
            color: #fff;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        a:hover {
            text-decoration: underline;
        }

        .forgot-link {
            margin-top: 10px;
            font-size: 13px;
            color: #00c6ff;
            text-decoration: none;
            text-align: center;
            width: 100%;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <h1>Automatic Task Reminder</h1>
</header>

<form action="/login" method="post">
    <h2>Login</h2>

    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
    <a href="/forgot-password" class="forgot-link">Forgot Password?</a>

    <div class="error-message" th:text="${error}"></div>
</form>

<a href="/register">Don't have an account? Register</a>

<footer>
    <p>&copy; 2026 Automatic Task Reminder. All rights reserved.</p>
</footer>

</body>
</html>
