<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - Task Remainder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Open Sans", sans-serif; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #000000, #434343);
    }

    .card {
      width: 370px;
      padding: 35px 30px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h2 { color: #fff; text-align: center; margin-bottom: 8px; }

    input {
      width: 100%;
      height: 40px;
      padding: 0 10px;
      border: none;
      border-bottom: 2px solid #ccc;
      background: transparent;
      color: #fff;
      font-size: 14px;
      outline: none;
      margin-bottom: 8px;
    }

    input::placeholder { color: rgba(255,255,255,0.5); }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      background: #fff;
      color: #000;
      border: none;
    }

    button:hover {
      background: transparent;
      color: #fff;
      border: 1px solid #fff;
    }

    .send-otp-btn {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: #fff;
    }

    .send-otp-btn:hover {
      background: transparent;
      border: 1px solid #00c6ff;
      color: #00c6ff;
    }

    .success-msg {
      color: #00e676;
      font-size: 13px;
      text-align: center;
    }

    .error-msg {
      color: #ff4d4d;
      font-size: 13px;
      text-align: center;
    }

    .back-link {
      color: #fff;
      text-decoration: none;
      display: block;
      text-align: center;
      font-size: 13px;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <h2>🔐 Reset Password</h2>

  <!-- STEP 1: Enter email and request OTP -->
  <form action="/send-otp" method="post" th:unless="${otpSent}">
    <input type="email" name="email" placeholder="Enter your registered email" required />
    <button type="submit" class="send-otp-btn">Send OTP to Email</button>
  </form>

  <!-- STEP 2: Enter OTP + new password -->
  <form action="/reset-password" method="post" th:if="${otpSent}">
    <input type="hidden" name="email" th:value="${email}" />
    <p class="success-msg">✅ OTP sent to <strong th:text="${email}"></strong></p>
    <input type="text"     name="otp"            placeholder="Enter OTP"         required />
    <input type="password" name="newPassword"     placeholder="New Password"      required />
    <input type="password" name="confirmPassword" placeholder="Confirm Password"  required />
    <button type="submit">Reset Password</button>
  </form>

  <!-- Error -->
  <p class="error-msg" th:if="${error}" th:text="${error}"></p>

  <a href="/login" class="back-link">← Back to Login</a>
</div>

</body>
</html>
