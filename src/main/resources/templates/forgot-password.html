<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - Task Reminder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Open Sans", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      background: linear-gradient(135deg, #e0f7fa, #b2ebf2, #80deea);
      padding-top: 60px;
      padding-bottom: 60px;
    }

    header {
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      padding: 14px 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
    }

    header h1 {
      color: #006064;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    footer {
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      padding: 14px 30px;
      text-align: center;
      position: fixed;
      bottom: 0;
      left: 0;
    }

    footer p {
      color: rgba(0, 96, 100, 0.6);
      font-size: 13px;
    }

    .card {
      width: 370px;
      padding: 30px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 24px rgba(0, 188, 212, 0.2);
    }

    h2 {
      color: #006064;
      margin-bottom: 20px;
      text-align: center;
      width: 100%;
    }

    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    input {
      width: 100%;
      height: 40px;
      margin: 10px 0;
      padding: 0 10px;
      border: none;
      outline: none;
      border-bottom: 2px solid #80deea;
      background: transparent;
      color: #004d40;
      font-size: 15px;
    }

    input::placeholder {
      color: rgba(0, 96, 100, 0.5);
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background: #0097a7;
      color: #fff;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }

    button:hover {
      background: transparent;
      color: #0097a7;
      border: 1px solid #0097a7;
    }

    .success-msg {
      color: #00796b;
      font-size: 13px;
      text-align: center;
      margin: 8px 0;
    }

    .error-msg {
      color: #c62828;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }

    .back-link {
      margin-top: 15px;
      color: #006064;
      text-decoration: none;
      display: block;
      text-align: center;
      font-size: 13px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<header>
  <h1>Automatic Task Reminder</h1>
</header>

<div class="card">
  <h2> Reset Password</h2>

  <!-- STEP 1: Enter email and request OTP -->
  <form action="/send-otp" method="post" th:unless="${otpSent}">
    <input type="email" name="email" placeholder="Enter your registered email" required />
    <button type="submit">Send OTP to Email</button>
  </form>

  <!-- STEP 2: Enter OTP + new password -->
  <form action="/reset-password" method="post" th:if="${otpSent}">
    <input type="hidden" name="email" th:value="${email}" />
    <p class="success-msg"> OTP sent to <strong th:text="${email}"></strong></p>
    <input type="text"     name="otp"             placeholder="Enter OTP"          required />
    <input type="password" name="newPassword"      placeholder="New Password"       required />
    <input type="password" name="confirmPassword"  placeholder="Confirm Password"   required />
    <button type="submit">Reset Password</button>
  </form>

  <!-- Error -->
  <p class="error-msg" th:if="${error}" th:text="${error}"></p>

  <a href="/login" class="back-link">← Back to Login</a>
</div>

<footer>
  <p>&copy; 2026 Automatic Task Reminder. All rights reserved.</p>
</footer>

</body>
</html>
