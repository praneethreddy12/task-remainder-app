<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="stylesheet" th:href="@{/css/style.css}" href="/style.css">
  <meta charset="UTF-8">
  <title>Edit Task - Task Remainder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Open Sans", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      background: linear-gradient(135deg, #000000, #434343);
    }

    form {
      width: 400px;
      padding: 35px 30px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      color: #fff;
      margin-bottom: 20px;
      text-align: center;
      width: 100%;
    }

    label {
      width: 100%;
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      margin-top: 14px;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="datetime-local"],
    textarea,
    select {
      width: 100%;
      padding: 8px 0;
      border: none;
      outline: none;
      border-bottom: 2px solid #ccc;
      background: transparent;
      color: #fff;
      font-size: 15px;
      font-family: "Open Sans", sans-serif;
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    select {
      cursor: pointer;
    }

    select option {
      background: #222;
      color: #fff;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-top: 24px;
    }

    button {
      flex: 1;
      padding: 10px;
      background: #fff;
      color: #000;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
      font-family: "Open Sans", sans-serif;
    }

    button:hover {
      background: transparent;
      color: #fff;
      border: 1px solid #fff;
    }

    .btn-cancel {
      flex: 1;
      padding: 10px;
      background: transparent;
      color: #fff;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 5px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: 0.3s;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-cancel:hover {
      background: rgba(255,255,255,0.1);
      text-decoration: none;
    }
  </style>
</head>
<body>

<form action="/update-task" method="post">

  <h2>✏️ Edit Task</h2>

  <input type="hidden" name="id"        th:value="${task.id}" />
  <input type="hidden" name="userId"    th:value="${task.userId}" />
  <input type="hidden" name="userEmail" th:value="${task.userEmail}" />

  <label for="title">Title</label>
  <input type="text" id="title" name="title"
         th:value="${task.title}"
         placeholder="Task title" required />

  <label for="description">Description</label>
  <textarea id="description" name="description"
            placeholder="Task description"
            th:text="${task.description}"></textarea>

  <label for="dueDate">Due Date &amp; Time</label>
  <input type="datetime-local" id="dueDate" name="dueDate"
         th:value="${#temporals.format(task.dueDate, 'yyyy-MM-dd''T''HH:mm')}" />

  <label for="status">Status</label>
  <select id="status" name="status">
    <option value="PENDING"     th:selected="${task.status == 'PENDING'}">Pending</option>
    <option value="IN_PROGRESS" th:selected="${task.status == 'IN_PROGRESS'}">In Progress</option>
    <option value="COMPLETED"   th:selected="${task.status == 'COMPLETED'}">Completed</option>
  </select>

  <div class="btn-group">
    <button type="submit">Update Task</button>
    <a href="/dashboard" class="btn-cancel">Cancel</a>
  </div>

</form>

</body>
</html>
